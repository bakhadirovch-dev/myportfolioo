<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karimov Otabek Baxadirovich | Digital Identity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #050a18; color: #ffffff; line-height: 1.6; overflow-x: hidden; width: 100%; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: rgba(5, 10, 24, 0.98);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid #fca311;
        }

        /* TEPADAGI LOGO VA DIGITAL IDENTITY YOG'DUSI */
        .name-brand { 
            font-size: 16px; font-weight: 900; color: #fca311; text-transform: uppercase; 
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .digital-identity { 
            color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: capitalize; 
            letter-spacing: 1px; border-left: 1px solid rgba(252, 163, 17, 0.5); padding-left: 8px; 
        }

        .nav-links { list-style: none; display: flex; gap: 12px; }
        .nav-links a { color: #ffffff; text-decoration: none; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: #fca311; }

        section { min-height: 100vh; padding: 100px 5% 40px 5%; display: flex; flex-direction: column; justify-content: center; }

        .hero { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 30px; }
        
        @media (min-width: 992px) {
            .hero { flex-direction: row; text-align: left; padding: 0 10%; gap: 60px; }
            .name-brand { font-size: 22px; }
            .digital-identity { font-size: 13px; }
            .nav-links { gap: 30px; }
            .nav-links a { font-size: 15px; }
        }

        .hero-content { width: 100%; }
        .full-name-title { font-size: 30px; font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-transform: uppercase; }
        @media (min-width: 768px) { .full-name-title { font-size: 45px; } }
        .full-name-title span { color: #fca311; }
        
        .hero-status { font-size: 15px; font-weight: 700; color: #fca311; margin-bottom: 20px; display: block; }
        
        .live-status {
            background: rgba(252, 163, 17, 0.1); border: 1px solid #fca311;
            padding: 10px 15px; border-radius: 8px; font-size: 13px; display: inline-flex;
            align-items: center; gap: 10px; margin-bottom: 20px;
        }
        .dot { width: 8px; height: 8px; background: #fca311; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* SKILLS CONTAINER */
        .skills-container { 
            width: 280px; height: 400px; border-radius: 20px;
            background-color: rgba(13, 22, 45, 0.5); 
            border: 3px solid #fca311; box-shadow: 0 0 20px rgba(252, 163, 17, 0.3);
            order: -1; padding: 25px 20px; display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        @media (min-width: 992px) {
            .skills-container { width: 380px; height: 500px; order: 1; padding: 30px; }
        }

        .skills-title {
            color: #fca311; font-size: 18px; font-weight: 900; text-align: center; 
            text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px;
        }

        .skill-block { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .skill-name { font-size: 13px; font-weight: 700; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .skill-name i { font-size: 16px; color: #fca311; width: 20px; text-align: center; }
        
        @media (min-width: 992px) {
            .skill-name { font-size: 15px; }
            .skill-name i { font-size: 18px; }
        }

        .progress-bar { width: 100%; height: 8px; background-color: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background-color: #fca311; border-radius: 10px; width: 0%; }
        .skill-percentage { font-size: 12px; font-weight: 900; color: #cbd5e0; margin-left: auto; display: inline-block; }

        .edu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
        @media (min-width: 768px) { .edu-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .edu-grid { grid-template-columns: repeat(3, 1fr); } }

        .edu-card:hover { transform: translateY(-5px); background: #14213d; }
